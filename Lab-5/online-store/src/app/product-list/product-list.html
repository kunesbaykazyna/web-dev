<p *ngIf="products.length === 0">No products in this category.</p>

<div class="main" *ngIf="products.length > 0">
    <app-product-item *ngFor="let product of products" [product]="product" (remove)="onRemove($event)">
    </app-product-item>
</div>
<div *ngIf="showRestore" class="restore-banner">
  <span>Товар удален.</span>
  <button (click)="onRestore()">Вернуть назад</button>
</div>
